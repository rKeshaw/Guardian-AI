# guardian/docker-compose.yml
#
# Two deployment modes:
#
#   MANAGED (starts ollama alongside the app):
#     docker compose --profile managed up
#
#   EXTERNAL (ollama already running on host):
#     docker compose up
#     Set in .env:
#       OLLAMA_BASE_URL=http://host.docker.internal:11434
#
# Model selection:
#   OLLAMA_MODEL=mixtral:latest          (recommended, requires ~26GB VRAM)
#   OLLAMA_MODEL=mistral:latest          (fallback, 8GB VRAM)
#   OLLAMA_MODEL_FAST=mistral:latest     (used for low-reasoning tasks)

services:

  # ── Ollama LLM server (managed mode only) ─────────────────────────────────
  ollama:
    profiles: [managed]
    image: ollama/ollama:latest
    container_name: guardian_ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── One-shot model pull (managed mode only) ────────────────────────────────
  ollama-init:
    profiles: [managed]
    image: ollama/ollama:latest
    container_name: guardian_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        MODEL=${OLLAMA_MODEL:-mixtral:latest} &&
        echo 'Pulling primary model: '$MODEL &&
        OLLAMA_HOST=http://ollama:11434 ollama pull $MODEL &&
        FAST_MODEL=${OLLAMA_MODEL_FAST:-ollama3:latest} &&
        echo 'Pulling fast model: '$FAST_MODEL &&
        OLLAMA_HOST=http://ollama:11434 ollama pull $FAST_MODEL &&
        echo 'Model pull complete.'
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ── Guardian AI ────────────────────────────────────────────────────────────
  guardian_ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: guardian_ai
    ports:
      - "${GUARDIAN_PORT:-8888}:8888"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ../PayloadsAllTheThings:/PayloadsAllTheThings:ro
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mixtral:latest}
      - OLLAMA_MODEL_FAST=${OLLAMA_MODEL_FAST:-ollama3:latest}
      - DATABASE_URL=sqlite:////app/data/guardian.db
      - PAYLOADS_REPO_PATH=/PayloadsAllTheThings
      - VERIFY_SSL=${VERIFY_SSL:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GUARDIAN_PORT=8888
      - MAX_GRAPH_TOKENS=${MAX_GRAPH_TOKENS:-50000}
      - MAX_CONCURRENT_SCANS=${MAX_CONCURRENT_SCANS:-3}
    depends_on:
      ollama:
        condition: service_healthy
        required: false
      ollama-init:
        condition: service_completed_successfully
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ollama_models:
